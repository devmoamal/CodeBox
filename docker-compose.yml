version: "3.8"

services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./server/storage:/app/server/storage
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./storage/database/codebox.db
      - PORT=3000
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - "80:80"
    environment:
      - VITE_APP_PORT=80
      - VITE_API_URL=http://kufapi.local:3000/api
    depends_on:
      - server
    restart: unless-stopped
